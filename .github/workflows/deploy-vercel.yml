name: Deploy Frontend to Vercel (Production)

on:
  workflow_dispatch:
    inputs:
      vercel_token:
        description: 'Vercel API Token'
        required: true
        type: string
      vercel_org_id:
        description: 'Vercel Organization ID'
        required: true
        type: string
      vercel_project_id:
        description: 'Vercel Project ID'
        required: true
        type: string
      api_url:
        description: 'Backend API URL (e.g., https://priv8sus.railway.app)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          cd frontend
          vercel deploy --prod --token ${{ inputs.vercel_token }} --yes \
            --org ${{ inputs.vercel_org_id }} \
            --project ${{ inputs.vercel_project_id }} \
            --build-env VITE_API_URL=${{ inputs.api_url }}
        env:
          VERCEL_TOKEN: ${{ inputs.vercel_token }}
